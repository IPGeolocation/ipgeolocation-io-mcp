<svg width="188" height="44" viewBox="0 0 188 44" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Add to Cursor</title>
  <desc id="desc">Install the IPGeolocation.io MCP Server in Cursor.</desc>
  <defs>
    <linearGradient id="bg" x1="12" y1="6" x2="176" y2="38" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0F16"/>
      <stop offset="1" stop-color="#121A27"/>
    </linearGradient>
    <linearGradient id="accent" x1="24" y1="10" x2="44" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="shine" x1="22" y1="8" x2="166" y2="8" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="188" height="44" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="2"/>
      <feGaussianBlur stdDeviation="3"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0196 0 0 0 0 0.0353 0 0 0 0 0.0588 0 0 0 0.26 0"/>
