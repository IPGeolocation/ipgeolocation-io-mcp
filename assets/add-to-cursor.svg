  <g filter="url(#shadow)">
    <rect x="6" y="4" width="176" height="32" rx="16" fill="url(#bg)"/>
    <rect x="6.5" y="4.5" width="175" height="31" rx="15.5" stroke="#243042"/>
    <path d="M22 9H166" stroke="url(#shine)" stroke-linecap="round"/>
    <rect x="18" y="10" width="20" height="20" rx="10" fill="#0F1724"/>
    <path d="M24 25.2L28.7 18.8H26L30.1 14.8H34L29.7 20.3H32.7L28.7 25.2H24Z" fill="url(#accent)"/>
    <text x="48" y="22" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.2px">Add to Cursor</text>
    <text x="141" y="22" fill="#8AA0B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="500">one-click</text>
